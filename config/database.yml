default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # These are the Docker credentials we added:
  host: localhost
  username: postgres
  password: password

development:
  <<: *default
  database: mcp_server_manager_development

test:
  <<: *default
  database: mcp_server_manager_test

production:
  <<: *default
  database: mcp_server_manager_production
  username: mcp_server_manager
  password: <%= ENV["MCP_SERVER_MANAGER_DATABASE_PASSWORD"] %>